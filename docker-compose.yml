version: "3.9"

x-env-file: &env-file
  env_file: ./.env

services:
  db:
    <<: *env-file
    image: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: nutricoreiq
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1596387413
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d nutricoreiq" ]
      interval: 5s
      timeout: 3s
      retries: 5

  maildev:
    image: maildev/maildev
    container_name: maildev
    environment:
      - TZ=Europe/Moscow
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    ports:
      - "1080:1080"
      - "1025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 5s
      timeout: 3s
      retries: 5

#  test_db:
#    image: postgres
#    environment:
#      POSTGRES_DB: ${APP__CONFIG__DB__TEST_NAME}
#      POSTGRES_USER: ${APP__CONFIG__DB__TEST_USER}
#      POSTGRES_PASSWORD: ${APP__CONFIG__DB__TEST_PASSWORD}
#    ports:
#      - "5435:5432"

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6378:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
    command: redis-server --save 60 1 --loglevel warning

  web:
    <<: *env-file
    build: .
    container_name: nutricoreiq_web
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      maildev:
        condition: service_started
    volumes:
      - ./src/app/logs:/nutricoreiq/src/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/metrics')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

volumes:
  pgdata:
  redisdata:
  rabbitmq-data: