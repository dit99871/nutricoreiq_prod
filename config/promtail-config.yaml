server:
  http_listen_port: 9080
  log_level: info

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5s
      max_retries: 10

scrape_configs:
  # только файловые логи приложения
  - job_name: fastapi
    static_configs:
      - targets:
          - localhost
        labels:
          job: fastapi
          service: web_app
          __path__: /home/deployer/nutricoreiq/src/app/logs/*.log
    pipeline_stages:
      # парсим структурированные логи приложения с уровнями
      - regex:
          expression: '^\[(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})\]\s+(?:\[(?P<process_name>[\w\s]+)\]\s+)?(?P<module>[\w\.]+):(?P<line>\d+)\s+(?P<level>\w+)\s*-\s*(?P<message>.*)'
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05.000"
      # добавляем уровень в начало для Grafana
      - template:
          source: grafana_message
          template: '{{ .level }} [{{ .timestamp }}] {{ if .process_name }}[{{ .process_name }}] {{ end }}{{ .module }}:{{ .line }} - {{ .message }}'
      - output:
          source: grafana_message
      # создаем label уровня для Grafana
      - regex:
          expression: '^(?P<level>\w+)'
      - labels:
          level:
      - output:
          source: grafana_message
      - drop:
          expression: ".*\\n.*"
          drop_counter_reason: "multiline_log"

  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'
        replacement: '${1}'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # исключаем web_app контейнер, чтобы не было дублирования с файлами
      - source_labels: ['__meta_docker_container_name']
        regex: '/web_app.*'
        action: drop
      - source_labels: ['__meta_docker_container_name']
        regex: '/(promtail|loki)'
        action: drop
