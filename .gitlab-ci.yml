image: python:3.13

services:
  - postgres:17
  - redis:alpine
  - rabbitmq:3-management

# Общие переменные
variables:
    # Настройки окружения
    APP_CONFIG__ENV__ENV: "test"

    # Настройки базы данных
    POSTGRES_DB: test_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST: localhost
    POSTGRES_PORT: 5432
    POSTGRES_SSL_MODE: disable

    # Настройки JWT
    APP_CONFIG__AUTH__SECRET_KEY: test-secret-key-for-ci-123
    APP_CONFIG__AUTH__ALGORITHM: HS256
    APP_CONFIG__AUTH__ACCESS_TOKEN_EXPIRES: "7"
    APP_CONFIG__AUTH__REFRESH_TOKEN_EXPIRES: "7"

    # Настройки Redis
    REDIS_PORT: 6379
    REDIS_ADDR: localhost
    APP_CONFIG__REDIS__URL: "redis://localhost:6379/0"
    APP_CONFIG__REDIS__SALT: test-salt
    APP_CONFIG__REDIS__PASSWORD: test-password
    APP_CONFIG__REDIS__SESSION_TTL: "3600"

    # Настройки кеширования
    APP_CONFIG__CACHE__USER_TTL: "3600"

    # Настройки приложения
    HTTP_PORT: 80
    HTTPS_PORT: 443
    APP_CONFIG__RUN__HOST: "0.0.0.0"
    APP_CONFIG__RUN__PORT: "8080"

    # Настройки CORS
    APP_CONFIG__CORS__ALLOW_ORIGINS: '["*"]'
    APP_CONFIG__CORS__ALLOW_METHODS: '["GET", "HEAD", "POST", "DELETE"]'
    APP_CONFIG__CORS__ALLOW_HEADERS: '["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]'
    APP_CONFIG__CORS__ALLOW_CREDENTIALS: "true"

    # Настройки лимитов
    APP_CONFIG__RATE_LIMIT__REGISTER: "1000/minute"
    APP_CONFIG__RATE_LIMIT__LOGIN: "1000/minute"
    APP_CONFIG__RATE_LIMIT__PASSWORD_CHANGE: "1000/minute"

    # Настройки логирования
    APP_CONFIG__LOGGING__LOG_LEVEL: "INFO"
    APP_CONFIG__LOGGING__LOG_STAGE: "DEV"

    # Настройки для работы с БД в тестах
    APP_CONFIG__DB__URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test_db"
    APP_CONFIG__DB__ECHO: "false"

    # Настройки Loki
    APP_CONFIG__LOKI__URL: "http://localhost:3100"
    APP_CONFIG__LOKI__ENABLED: "false"

    # Настройки почты (обязательные поля с тестовыми значениями)
    APP_CONFIG__MAIL__HOST: "smtp.example.com"
    APP_CONFIG__MAIL__PORT: "587"
    APP_CONFIG__MAIL__BUTTON_LINK: "https://example.com/verify"
    APP_CONFIG__MAIL__UNSUBSCRIBE_LINK: "https://example.com/unsubscribe"
    APP_CONFIG__MAIL__USERNAME: "test@example.com"
    APP_CONFIG__MAIL__PASSWORD: "test-password"
    APP_CONFIG__MAIL__USE_TLS: "true"

    # Настройки Sentry (обязательные поля)
    APP_CONFIG__SENTRY__DSN: "https://test@example.com/123"

    # Настройки Taskiq
    APP_CONFIG__TASKIQ__URL: "amqp://guest:guest@localhost:5672//"

# Кэширование зависимостей
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .venv/
    - .cache/pip/
    - .cache/poetry/

stages:
  - test
  - lint
  - build
  - deploy

before_script:
  - |
    # Установка зависимостей
    python -m pip install --upgrade pip
    pip install poetry
    poetry config virtualenvs.create true
    poetry config virtualenvs.in-project true
    poetry install --no-interaction --no-root
    
    # Ожидание PostgreSQL
    echo "Waiting for PostgreSQL to be ready..."
    for i in {1..30}; do
      if pg_isready -h $POSTGRES_HOST -U $POSTGRES_USER; then
        echo "PostgreSQL is ready"
        break
      fi
      echo "Waiting for PostgreSQL..."
      sleep 1
    done
    
    # Создание тестовой БД
    psql -h $POSTGRES_HOST -U $POSTGRES_USER -c "CREATE DATABASE $POSTGRES_DB;" || true

# Тесты
.test:template: &test_template
  script:
    - poetry run pytest --asyncio-mode=auto --cov=src --cov-report=xml
  coverage: '/^TOTAL.+\s+(\d+%)$/'  
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# Линтеры
.lint:template: &lint_template
  script:
    - poetry run black --check src/

test:unit:
  <<: *test_template
  stage: test
  only:
    - merge_requests
    - main
    - develop

lint:code:
  <<: *lint_template
  stage: lint
  only:
    - merge_requests
    - main
    - develop

# Сборка Docker-образа
build:image:
  stage: build
  image: docker:24.0.6
  services:
    - docker:24.0.6-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script: []
  script:
    - |
      # Проверка обязательных переменных
      if [ -z "$CI_REGISTRY" ] || [ -z "$CI_REGISTRY_USER" ] || [ -z "$CI_REGISTRY_PASSWORD" ]; then
        echo "ERROR: Docker registry credentials not set"
        exit 1
      fi
      
      # Логин в registry
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
      
      # Сборка и пуш образа
      TAG=${CI_COMMIT_REF_SLUG:-latest}
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        TAG="latest"
      fi
      
      docker build -t "$CI_REGISTRY_IMAGE:$TAG" .
      docker push "$CI_REGISTRY_IMAGE:$TAG"
  only:
    - main
    - develop
    - merge_requests
  except:
    - tags

# Деплой на продакшен
deploy:prod:
  tags:
    - production
    - deploy
  stage: deploy
  variables:
    # Переменные для SSH
    SSH_PRIVATE_KEY: $SSH_PRIVATE_KEY
    SSH_HOST: $SSH_HOST
    SSH_USER: $SSH_USER
    SSH_PORT: ${SSH_PORT:-22}
    
    # Переменные для Docker
    DOCKER_REGISTRY: $CI_REGISTRY
    DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
    
    # Путь к проекту на сервере
    DEPLOY_PATH: "/home/deployer/nutricoreiq"

  before_script:
    - command -v ssh || (echo "ssh not found" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_ed25519
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  
  script:
    - |
      echo "=== Проверка окружения ==="
      whoami
      pwd
      ls -la
      echo "=== Проверка Docker ==="
      docker --version
      docker-compose --version
      echo "=== Проверка SSH-ключа ==="
      ls -la ~/.ssh/
      echo "=== Проверка подключения к серверу ==="
      echo "SSH_PORT: ${SSH_PORT:-22}"
      echo "SSH_USER: $SSH_USER"
      echo "SSH_HOST: $SSH_HOST"
      ssh -v -p ${SSH_PORT:-22} $SSH_USER@$SSH_HOST "echo 'SSH connection successful'"
      echo "=== Проверка завершена ==="
    - |
      # Проверка обязательных переменных
      for var in SSH_PRIVATE_KEY SSH_HOST SSH_USER DOCKER_REGISTRY DOCKER_IMAGE; do
        if [ -z "${!var}" ]; then
          echo "ERROR: Required variable $var is not set"
          exit 1
        fi
      done
      
      # Деплой на сервер
      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST /bin/sh << 'EOF'
        set -e
      
        # Создаем директорию, если не существует
        mkdir -p $DEPLOY_PATH
        
        # Копируем .env из защищенной директории, если существует
        if [ -f "/etc/nutricoreiq/.env" ]; then
          cp /etc/nutricoreiq/.env $DEPLOY_PATH/.env
        fi
      
        # Переходим в директорию проекта
        cd $DEPLOY_PATH
      
        # Логинимся в Docker Registry
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$DOCKER_REGISTRY"
      
        # Останавливаем и удаляем старые контейнеры
        docker-compose -f docker-compose.prod.yml down || true
      
        # Подтягиваем новый образ
        docker pull $DOCKER_IMAGE
      
        # Запускаем сервисы
        docker-compose -f docker-compose.prod.yml up -d
      
        # Очищаем неиспользуемые образы
        docker image prune -f
      
        # Проверяем здоровье сервиса
        echo "Checking service health..."
        if ! curl -sSf http://localhost:8080/health > /dev/null; then
          echo "ERROR: Service health check failed"
          exit 1
        fi
      
        echo "Deployment completed successfully"
      EOF
  
  after_script:
    - |
      # Отправка уведомления в Slack/TG/Email
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        echo "Deployment failed! Check the logs for details."
        # Здесь можно добавить отправку уведомлений
      fi
  
  # Только для ветки main и с ручным подтверждением
  only:
    - main
  when: manual
  allow_failure: false

# Уведомления о падении пайплайна
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never