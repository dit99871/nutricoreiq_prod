image: python:3.13-slim

services:
  - postgres:17
  - redis:alpine

# Общие переменные
variables:
    # Настройки окружения
    APP_CONFIG__ENV__ENV: "test"
    
    # Версия Python
    PYTHON_VERSION: "3.13"
    
    # Настройки кеширования
    CACHE_VERSION: "v1"

    # Настройки базы данных
    POSTGRES_DB: test_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST: localhost
    POSTGRES_PORT: 5432
    POSTGRES_SSL_MODE: disable

    # Настройки для работы с БД в тестах
    APP_CONFIG__DB__TEST_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/test_db"
    APP_CONFIG__DB__ECHO: "false"

    # Настройки JWT
    APP_CONFIG__AUTH__SECRET_KEY: test-secret-key-for-ci-123
    APP_CONFIG__AUTH__ALGORITHM: HS256
    APP_CONFIG__AUTH__ACCESS_TOKEN_EXPIRES: "7"
    APP_CONFIG__AUTH__REFRESH_TOKEN_EXPIRES: "7"

    # Настройки Redis
    REDIS_PORT: 6379
    REDIS_ADDR: localhost
    APP_CONFIG__REDIS__URL: "redis://localhost:6379/0"
    APP_CONFIG__REDIS__SALT: test-salt
    APP_CONFIG__REDIS__PASSWORD: test-password
    APP_CONFIG__REDIS__SESSION_TTL: "3600"

    # Настройки кеширования
    APP_CONFIG__CACHE__USER_TTL: "3600"

    # Настройки приложения
    HTTP_PORT: 80
    HTTPS_PORT: 443
    APP_CONFIG__RUN__HOST: "0.0.0.0"
    APP_CONFIG__RUN__PORT: "8080"

    # Настройки CORS
    APP_CONFIG__CORS__ALLOW_ORIGINS: '["*"]'
    APP_CONFIG__CORS__ALLOW_METHODS: '["GET", "HEAD", "POST", "DELETE"]'
    APP_CONFIG__CORS__ALLOW_HEADERS: '["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]'
    APP_CONFIG__CORS__ALLOW_CREDENTIALS: "true"

    # Настройки лимитов
    APP_CONFIG__RATE_LIMIT__REGISTER: "1000/minute"
    APP_CONFIG__RATE_LIMIT__LOGIN: "1000/minute"
    APP_CONFIG__RATE_LIMIT__PASSWORD_CHANGE: "1000/minute"

    # Настройки логирования
    APP_CONFIG__LOGGING__LOG_LEVEL: "INFO"

    # Настройки Loki
    APP_CONFIG__LOKI__URL: "http://localhost:3100"
    APP_CONFIG__LOKI__ENABLED: "false"

    # Настройки почты (обязательные поля с тестовыми значениями)
    APP_CONFIG__MAIL__HOST: "smtp.example.com"
    APP_CONFIG__MAIL__PORT: "587"
    APP_CONFIG__MAIL__BUTTON_LINK: "https://example.com/verify"
    APP_CONFIG__MAIL__UNSUBSCRIBE_LINK: "https://example.com/unsubscribe"
    APP_CONFIG__MAIL__USERNAME: "test@example.com"
    APP_CONFIG__MAIL__PASSWORD: "test-password"
    APP_CONFIG__MAIL__USE_TLS: "true"

    # Настройки Sentry (обязательные поля)
    APP_CONFIG__SENTRY__DSN: "https://test@example.com/123"

    # Настройки Taskiq
    APP_CONFIG__TASKIQ__URL: "amqp://guest:guest@localhost:5672//"

# Кэширование зависимостей
cache:
  key: 
    files:
      - poetry.lock
      - pyproject.toml
  paths:
    - .venv/
    - .cache/pip/
    - .cache/poetry/
  policy: pull-push

stages:
  - test
  - lint
  - build
  - deploy

before_script:
  # Установка системных зависимостей для slim образа
  - apt-get update && apt-get install -y --no-install-recommends libpq-dev curl && rm -rf /var/lib/apt/lists/*
  # Установка зависимостей
  - python -m pip install --upgrade pip
  - pip install poetry
  - poetry config virtualenvs.create true
  - poetry config virtualenvs.in-project true
  - poetry install --no-interaction --no-root
  # Ожидание готовности PostgreSQL
  - |
    echo "Waiting for PostgreSQL to be ready..."
    for i in {1..30}; do
      if pg_isready -h $POSTGRES_HOST -U $POSTGRES_USER; then
        echo "PostgreSQL is ready"
        break
      fi
      sleep 1
    done
  # Создание тестовой базы данных
  - psql -h $POSTGRES_HOST -U $POSTGRES_USER -c "CREATE DATABASE $POSTGRES_DB;" || true

.test:template: &test_template
  stage: test
  script:
    # Запуск тестов
    - poetry run pytest --asyncio-mode=auto --cov=src --cov-report=xml --cov-report=html
  coverage: '/^TOTAL.+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
    when: always
    expire_in: 1 week
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# Линтеры
.lint:template: &lint_template
  stage: lint
  script:
    - poetry run black --check src/
  allow_failure: false
  retry:
    max: 1
    when: runner_system_failure

test:unit:
  <<: *test_template
  only:
    - merge_requests
    - main
    - develop
  timeout: 10m

lint:code:
  <<: *lint_template
  only:
    - merge_requests
    - main
    - develop
  timeout: 5m

# Сборка Docker-образа
build:image:
  stage: build
  image: docker:24.0.6
  services:
    - docker:24.0.6-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2
  before_script: []
  script:
    # используем литерал "gitlab-ci-token" вместо переменной
    - echo "Logging into GitLab Container Registry..."
    - echo "$CI_JOB_TOKEN" | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY

    # Определяем тег
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        TAG="latest"
      elif [ -n "$CI_COMMIT_TAG" ]; then
        TAG="$CI_COMMIT_TAG"
      else
        TAG="$CI_COMMIT_REF_SLUG"
      fi
      echo "Building image with tag: $TAG"

    # Собираем образ
    - docker build -t "$CI_REGISTRY_IMAGE:$TAG" .

    # Пушим образ
    - docker push "$CI_REGISTRY_IMAGE:$TAG"

    # Если это main и тег не latest - создаем дополнительно latest
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ] && [ "$TAG" != "latest" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$TAG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  only:
    - main
    - develop
    - merge_requests
    - tags
  timeout: 15m
  retry:
    max: 1
    when: runner_system_failure

# Деплой на прод
deploy:prod:
  stage: deploy
  tags:
    - production
    - deploy
  
  before_script: []
  cache: {}
  
  variables:
    SSH_PRIVATE_KEY: $SSH_PRIVATE_KEY
    SSH_HOST: $SSH_HOST
    SSH_USER: $SSH_USER
    SSH_PORT: ${SSH_PORT:-22}
    DOCKER_REGISTRY: $CI_REGISTRY
    DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
    DEPLOY_PATH: $DEPLOY_PATH
    # Альтернатива: использовать CI_JOB_TOKEN вместо Deploy Token
    CI_JOB_TOKEN: $CI_JOB_TOKEN
  
  script:
    # Настройка SSH
    - command -v ssh || (echo "Ошибка - ssh не установлен" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_ed25519
    - |
      if [ -z "$SSH_HOST" ] || [ -z "$SSH_PORT" ]; then
        echo "ERROR: SSH_HOST or SSH_PORT not set!"
        exit 1
      fi
    - ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
    - chmod 644 ~/.ssh/known_hosts

    # Тестовое подключение
    - echo "=== Проверка SSH подключения ==="
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "echo 'SSH connected successfully'"

    # Копируем скрипт деплоя на удалённый сервер
    - scp -P $SSH_PORT scripts/deploy.sh $SSH_USER@$SSH_HOST:/tmp/deploy_script.sh
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "chmod +x /tmp/deploy_script.sh"

    # Запускаем скрипт деплоя
    - |
      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "export DEPLOY_PATH='$DEPLOY_PATH' && \
        export DOCKER_REGISTRY='$DOCKER_REGISTRY' && \
        export DOCKER_IMAGE='$DOCKER_IMAGE' && \
        export CI_JOB_TOKEN='$CI_JOB_TOKEN' && \
        bash /tmp/deploy_script.sh && \
        rm -f /tmp/deploy_script.sh"

  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        echo "ОШИБКА: Деплой не удался! Проверьте логи для деталей."
      else
        echo "Деплой успешно завершен!"
      fi
    # Очистка SSH ключей
    - rm -rf ~/.ssh

  only:
    - main
  when: manual
  allow_failure: false
  timeout: 20m
  retry:
    max: 0

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

# Security scanning
security:sast:
  stage: test
  image: python:3.13-slim
  before_script:
    # Установка Poetry и зависимостей
    - python -m pip install --upgrade pip
    - pip install poetry
    - poetry config virtualenvs.create true
    - poetry config virtualenvs.in-project true
    - poetry install --no-interaction --no-root
    # Установка security инструментов
    - pip install safety bandit
  script:
    # Экспорт зависимостей из Poetry и проверка безопасности
    - poetry export --format=requirements.txt --without-hashes --dev -o requirements.txt
    - safety check --json --output safety-report.json --file requirements.txt || true
    - bandit -r src/ -f json -o bandit-report.json || true
  artifacts:
    paths:
      - safety-report.json
      - bandit-report.json
    expire_in: 1 week
  allow_failure: true
  only:
    - main
    - develop
    - merge_requests
  timeout: 5m