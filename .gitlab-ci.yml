image: python:3.13-slim

services:
  - postgres:17
  - redis:alpine

# Общие переменные
variables:
    # Настройки окружения
    APP_CONFIG__ENV__ENV: "test"

    # Настройки базы данных
    POSTGRES_DB: test_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST: localhost
    POSTGRES_PORT: 5432
    POSTGRES_SSL_MODE: disable

    # Настройки для работы с БД в тестах
    APP_CONFIG__DB__TEST_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/test_db"
    APP_CONFIG__DB__ECHO: "false"

    # Настройки JWT
    APP_CONFIG__AUTH__SECRET_KEY: test-secret-key-for-ci-123
    APP_CONFIG__AUTH__ALGORITHM: HS256
    APP_CONFIG__AUTH__ACCESS_TOKEN_EXPIRES: "7"
    APP_CONFIG__AUTH__REFRESH_TOKEN_EXPIRES: "7"

    # Настройки Redis
    REDIS_PORT: 6379
    REDIS_ADDR: localhost
    APP_CONFIG__REDIS__URL: "redis://localhost:6379/0"
    APP_CONFIG__REDIS__SALT: test-salt
    APP_CONFIG__REDIS__PASSWORD: test-password
    APP_CONFIG__REDIS__SESSION_TTL: "3600"

    # Настройки кеширования
    APP_CONFIG__CACHE__USER_TTL: "3600"

    # Настройки приложения
    HTTP_PORT: 80
    HTTPS_PORT: 443
    APP_CONFIG__RUN__HOST: "0.0.0.0"
    APP_CONFIG__RUN__PORT: "8080"

    # Настройки CORS
    APP_CONFIG__CORS__ALLOW_ORIGINS: '["*"]'
    APP_CONFIG__CORS__ALLOW_METHODS: '["GET", "HEAD", "POST", "DELETE"]'
    APP_CONFIG__CORS__ALLOW_HEADERS: '["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]'
    APP_CONFIG__CORS__ALLOW_CREDENTIALS: "true"

    # Настройки лимитов
    APP_CONFIG__RATE_LIMIT__REGISTER: "1000/minute"
    APP_CONFIG__RATE_LIMIT__LOGIN: "1000/minute"
    APP_CONFIG__RATE_LIMIT__PASSWORD_CHANGE: "1000/minute"

    # Настройки логирования
    APP_CONFIG__LOGGING__LOG_LEVEL: "INFO"

    # Настройки Loki
    APP_CONFIG__LOKI__URL: "http://localhost:3100"
    APP_CONFIG__LOKI__ENABLED: "false"

    # Настройки почты (обязательные поля с тестовыми значениями)
    APP_CONFIG__MAIL__HOST: "smtp.example.com"
    APP_CONFIG__MAIL__PORT: "587"
    APP_CONFIG__MAIL__BUTTON_LINK: "https://example.com/verify"
    APP_CONFIG__MAIL__UNSUBSCRIBE_LINK: "https://example.com/unsubscribe"
    APP_CONFIG__MAIL__USERNAME: "test@example.com"
    APP_CONFIG__MAIL__PASSWORD: "test-password"
    APP_CONFIG__MAIL__USE_TLS: "true"

    # Настройки Sentry (обязательные поля)
    APP_CONFIG__SENTRY__DSN: "https://test@example.com/123"

    # Настройки Taskiq
    APP_CONFIG__TASKIQ__URL: "amqp://guest:guest@localhost:5672//"

# Кэширование зависимостей
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .venv/
    - .cache/pip/
    - .cache/poetry/

stages:
  - test
  - lint
  - build
  - deploy

before_script:
  # Установка системных зависимостей для slim образа
  - apt-get update && apt-get install -y --no-install-recommends libpq-dev && rm -rf /var/lib/apt/lists/*
  # Установка зависимостей
  - python -m pip install --upgrade pip
  - pip install poetry
  - poetry config virtualenvs.create true
  - poetry config virtualenvs.in-project true
  - poetry install --no-interaction --no-root
  # Ожидание готовности PostgreSQL
  - |
    echo "Waiting for PostgreSQL to be ready..."
    for i in {1..30}; do
      if pg_isready -h $POSTGRES_HOST -U $POSTGRES_USER; then
        echo "PostgreSQL is ready"
        break
      fi
      sleep 1
    done
  # Создание тестовой базы данных
  - psql -h $POSTGRES_HOST -U $POSTGRES_USER -c "CREATE DATABASE $POSTGRES_DB;" || true

.test:template: &test_template
  script:
    # Запуск тестов
    - poetry run pytest --asyncio-mode=auto --cov=src --cov-report=xml
  coverage: '/^TOTAL.+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# Линтеры
.lint:template: &lint_template
  script:
    - poetry run black --check src/

test:unit:
  <<: *test_template
  stage: test
  only:
    - merge_requests
    - main
    - develop

lint:code:
  <<: *lint_template
  stage: lint
  only:
    - merge_requests
    - main
    - develop

# Сборка Docker-образа
build:image:
  stage: build
  image: docker:24.0.6
  services:
    - docker:24.0.6-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2
  before_script: []
  script:
    # ИСПРАВЛЕНИЕ: Используем литерал "gitlab-ci-token" вместо переменной
    - echo "Logging into GitLab Container Registry..."
    - echo "$CI_JOB_TOKEN" | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY

    # Определяем тег
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        TAG="latest"
      else
        TAG="$CI_COMMIT_REF_SLUG"
      fi
      echo "Building image with tag: $TAG"

    # Собираем образ
    - docker build -t "$CI_REGISTRY_IMAGE:$TAG" .

    # Пушим образ
    - docker push "$CI_REGISTRY_IMAGE:$TAG"

    # Если это main и тег не latest - создаем дополнительно latest
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ] && [ "$TAG" != "latest" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$TAG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  only:
    - main
    - develop
    - merge_requests
  except:
    - tags

# Деплой на прод
deploy:prod:
  tags:
    - production
    - deploy
  stage: deploy

  before_script: []

  cache: {}

  variables:
    SSH_PRIVATE_KEY: $SSH_PRIVATE_KEY
    SSH_HOST: $SSH_HOST
    SSH_USER: $SSH_USER
    SSH_PORT: ${SSH_PORT:-22}
    DOCKER_REGISTRY: $CI_REGISTRY
    DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
    DEPLOY_PATH: $DEPLOY_PATH

  script:
    # Настройка SSH
    - command -v ssh || (echo "Ошибка - ssh не установлен" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_ed25519
    - |
      if [ -z "$SSH_HOST" ] || [ -z "$SSH_PORT" ]; then
        echo "ERROR: SSH_HOST or SSH_PORT not set!"
        exit 1
      fi
    - ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
    - chmod 644 ~/.ssh/known_hosts

    # Тестовое подключение
    - echo "=== Проверка SSH подключения ==="
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "echo 'SSH connected successfully'"

    # Создаем скрипт деплоя локально
    - |
      cat > /tmp/deploy_script.sh << 'DEPLOY_SCRIPT'
      #!/bin/bash
      set -e
      
      echo "=== Начало деплоя ==="
      echo "DEPLOY_PATH: $DEPLOY_PATH"
      echo "DOCKER_IMAGE: $DOCKER_IMAGE"
      echo "DOCKER_REGISTRY: $DOCKER_REGISTRY"
      
      # Создание директории проекта
      if ! mkdir -p "$DEPLOY_PATH"; then
        echo "ОШИБКА: Не удалось создать директорию $DEPLOY_PATH"
        exit 1
      fi
      
      # Проверка доступа к Docker
      if ! docker ps > /dev/null; then
        echo "ОШИБКА: Нет доступа к Docker"
        exit 1
      fi
      
      # Копирование .env файла
      if [ -f "/etc/nutricoreiq/.env" ]; then
        if ! cp /etc/nutricoreiq/.env "$DEPLOY_PATH/.env"; then
          echo "ОШИБКА: Не удалось скопировать .env файл"
          exit 1
        fi
      fi
      
      # Переход в директорию проекта
      cd "$DEPLOY_PATH" || { echo "ОШИБКА: Не удалось перейти в $DEPLOY_PATH"; exit 1; }
      
      # КРИТИЧЕСКИ ВАЖНО: Логаут из старых сессий
      echo "=== Выход из предыдущих Docker сессий ==="
      docker logout "$DOCKER_REGISTRY" 2>/dev/null || true
      
      # Логин в Docker Registry с Deploy Token
      echo "=== Логин в Docker Registry ==="
      echo "Registry: $DOCKER_REGISTRY"
      echo "Username: $DEPLOY_TOKEN_USERNAME"
      
      if ! echo "$DEPLOY_TOKEN_PASSWORD" | docker login -u "$DEPLOY_TOKEN_USERNAME" --password-stdin "$DOCKER_REGISTRY"; then
        echo "ОШИБКА: Не удалось войти в Docker Registry"
        echo "Проверьте:"
        echo "1. Deploy Token создан и активен"
        echo "2. Username и Password правильные"
        echo "3. Scope 'read_registry' включен"
        exit 1
      fi
      
      echo "✓ Успешная авторизация в registry"
      
      # Остановка старых контейнеров
      echo "=== Остановка старых контейнеров ==="
      docker-compose -f docker-compose.prod.yml down || echo "Предупреждение: старые контейнеры не найдены"
      
      # Загрузка нового Docker-образа
      echo "=== Загрузка Docker образа: $DOCKER_IMAGE ==="
      if ! docker pull "$DOCKER_IMAGE"; then
        echo "ОШИБКА: Не удалось загрузить образ $DOCKER_IMAGE"
        echo "Проверьте что образ существует в Container Registry"
        exit 1
      fi
      
      echo "✓ Образ успешно загружен"
      
      # Запуск сервисов
      echo "=== Запуск сервисов ==="
      if ! docker-compose -f docker-compose.prod.yml up -d; then
        echo "ОШИБКА: Не удалось запустить сервисы"
        exit 1
      fi
      
      # Очистка неиспользуемых образов
      echo "=== Очистка старых образов ==="
      docker image prune -f
      
      # Пауза перед проверкой
      sleep 5
      
      # Проверка статуса контейнеров
      echo "=== Проверка статуса контейнеров ==="
      docker-compose -f docker-compose.prod.yml ps -a
      
      exited_services=$(docker-compose -f docker-compose.prod.yml ps -a | grep Exited | awk '{print $1}' || true)
      if [ -n "$exited_services" ]; then
        echo "ОШИБКА: Следующие сервисы завершили работу: $exited_services"
        for service in $exited_services; do
          echo "Логи сервиса $service:"
          docker-compose -f docker-compose.prod.yml logs "$service" || true
        done
        exit 1
      fi
      
      echo "=== Деплой успешно завершен ==="
      
      echo "=== Выход из Docker Registry ==="
      docker logout "$DOCKER_REGISTRY" || true
      DEPLOY_SCRIPT

    # Копируем скрипт на удалённый сервер
    - chmod +x /tmp/deploy_script.sh
    - scp -P $SSH_PORT /tmp/deploy_script.sh $SSH_USER@$SSH_HOST:/tmp/deploy_script.sh

    # Экспортируем переменные и запускаем скрипт
    - |
      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "export DEPLOY_PATH='$DEPLOY_PATH' && \
        export DOCKER_REGISTRY='$DOCKER_REGISTRY' && \
        export DOCKER_IMAGE='$DOCKER_IMAGE' && \
        export DEPLOY_TOKEN_USERNAME='$DEPLOY_TOKEN_USERNAME' && \
        export DEPLOY_TOKEN_PASSWORD='$DEPLOY_TOKEN_PASSWORD' && \
        bash /tmp/deploy_script.sh && \
        rm -f /tmp/deploy_script.sh"

  after_script:
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        echo "ОШИБКА: Деплой не удался! Проверьте логи для деталей."
      else
        echo "Деплой успешно завершен!"
      fi

  only:
    - main
  when: manual
  allow_failure: false

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never