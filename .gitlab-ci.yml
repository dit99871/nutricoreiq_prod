image: python:3.13

services:
  - postgres:17
  - redis:alpine

# Общие переменные
variables:
    # Настройки окружения
    APP_CONFIG__ENV__ENV: "test"

    # Настройки базы данных
    POSTGRES_DB: test_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST: localhost
    POSTGRES_PORT: 5432
    POSTGRES_SSL_MODE: disable

    # Настройки JWT
    APP_CONFIG__AUTH__SECRET_KEY: test-secret-key-for-ci-123
    APP_CONFIG__AUTH__ALGORITHM: HS256
    APP_CONFIG__AUTH__ACCESS_TOKEN_EXPIRES: "7"
    APP_CONFIG__AUTH__REFRESH_TOKEN_EXPIRES: "7"

    # Настройки Redis
    REDIS_PORT: 6379
    REDIS_ADDR: localhost
    APP_CONFIG__REDIS__URL: "redis://localhost:6379/0"
    APP_CONFIG__REDIS__SALT: test-salt
    APP_CONFIG__REDIS__PASSWORD: test-password
    APP_CONFIG__REDIS__SESSION_TTL: "3600"

    # Настройки кеширования
    APP_CONFIG__CACHE__USER_TTL: "3600"

    # Настройки приложения
    HTTP_PORT: 80
    HTTPS_PORT: 443
    APP_CONFIG__RUN__HOST: "0.0.0.0"
    APP_CONFIG__RUN__PORT: "8080"

    # Настройки CORS
    APP_CONFIG__CORS__ALLOW_ORIGINS: '["*"]'
    APP_CONFIG__CORS__ALLOW_METHODS: '["GET", "HEAD", "POST", "DELETE"]'
    APP_CONFIG__CORS__ALLOW_HEADERS: '["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]'
    APP_CONFIG__CORS__ALLOW_CREDENTIALS: "true"

    # Настройки лимитов
    APP_CONFIG__RATE_LIMIT__REGISTER: "1000/minute"
    APP_CONFIG__RATE_LIMIT__LOGIN: "1000/minute"
    APP_CONFIG__RATE_LIMIT__PASSWORD_CHANGE: "1000/minute"

    # Настройки логирования
    APP_CONFIG__LOGGING__LOG_LEVEL: "INFO"
    APP_CONFIG__LOGGING__LOG_STAGE: "DEV"

    # Настройки для работы с БД в тестах
    APP_CONFIG__DB__URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test_db"
    APP_CONFIG__DB__ECHO: "false"

    # Настройки Loki
    APP_CONFIG__LOKI__URL: "http://localhost:3100"
    APP_CONFIG__LOKI__ENABLED: "false"

    # Настройки почты (обязательные поля с тестовыми значениями)
    APP_CONFIG__MAIL__HOST: "smtp.example.com"
    APP_CONFIG__MAIL__PORT: "587"
    APP_CONFIG__MAIL__BUTTON_LINK: "https://example.com/verify"
    APP_CONFIG__MAIL__UNSUBSCRIBE_LINK: "https://example.com/unsubscribe"
    APP_CONFIG__MAIL__USERNAME: "test@example.com"
    APP_CONFIG__MAIL__PASSWORD: "test-password"
    APP_CONFIG__MAIL__USE_TLS: "true"

    # Настройки Sentry (обязательные поля)
    APP_CONFIG__SENTRY__DSN: "https://test@example.com/123"

    # Настройки Taskiq
    APP_CONFIG__TASKIQ__URL: "amqp://guest:guest@localhost:5672//"

# Кэширование зависимостей
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .venv/
    - .cache/pip/
    - .cache/poetry/

stages:
  - test
  - lint
  - build
  - deploy

before_script:
  # Установка зависимостей
  - python -m pip install --upgrade pip
  - pip install poetry
  - poetry config virtualenvs.create true
  - poetry config virtualenvs.in-project true
  - poetry install --no-interaction --no-root
  # Ожидание готовности PostgreSQL
  - |
    echo "Waiting for PostgreSQL to be ready..."
    for i in {1..30}; do
      if pg_isready -h $POSTGRES_HOST -U $POSTGRES_USER; then
        echo "PostgreSQL is ready"
        break
      fi
      sleep 1
    done
  # Создание тестовой базы данных
  - psql -h $POSTGRES_HOST -U $POSTGRES_USER -c "CREATE DATABASE $POSTGRES_DB;" || true

.test:template: &test_template
  script:
    # Запуск тестов
    - poetry run pytest --asyncio-mode=auto --cov=src --cov-report=xml
  coverage: '/^TOTAL.+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# Линтеры
.lint:template: &lint_template
  script:
    - poetry run black --check src/

test:unit:
  <<: *test_template
  stage: test
  only:
    - merge_requests
    - main
    - develop

lint:code:
  <<: *lint_template
  stage: lint
  only:
    - merge_requests
    - main
    - develop

# Сборка Docker-образа
build:image:
  stage: build
  image: docker:24.0.6
  services:
    - docker:24.0.6-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script: []
  script:
    # Проверка переменных и логин в Docker Registry
    - |
      if [ -z "$CI_REGISTRY" ] || [ -z "$CI_REGISTRY_USER" ] || [ -z "$CI_REGISTRY_PASSWORD" ]; then
        echo "ERROR: Docker registry credentials not set"
        exit 1
      fi
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Сборка и пуш Docker-образа
    - |
      TAG=${CI_COMMIT_REF_SLUG:-latest}
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        TAG="latest"
      fi
      docker build -t "$CI_REGISTRY_IMAGE:$TAG" .
      docker push "$CI_REGISTRY_IMAGE:$TAG"
  only:
    - main
    - develop
    - merge_requests
  except:
    - tags

# Деплой на прод
deploy:prod:
  tags:
    - production
    - deploy
  stage: deploy
  variables:
    # Переменные для SSH
    SSH_PRIVATE_KEY: $SSH_PRIVATE_KEY
    SSH_HOST: $SSH_HOST
    SSH_USER: $SSH_USER
    SSH_PORT: ${SSH_PORT:-22}

    # Переменные для Docker
    DOCKER_REGISTRY: $CI_REGISTRY
    DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest

    # Путь к проекту на сервере
    DEPLOY_PATH: $DEPLOY_PATH

  before_script:
    # Настройка SSH
    - command -v ssh || (echo "Ошибка - ssh не установлен" && exit 1)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_ed25519

    # Проверка SSH-переменных и настройка known_hosts
    - |
      if [ -z "$SSH_HOST" ] || [ -z "$SSH_PORT" ]; then
        echo "ERROR: SSH_HOST or SSH_PORT not set!"
        exit 1
      fi
    - ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
    - chmod 644 ~/.ssh/known_hosts

  script:
    # Деплой на сервер
    - |
      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST /bin/sh << EOF
        set -e
        # Создание директории проекта
        if ! mkdir -p "$DEPLOY_PATH"; then
          echo "ОШИБКА: Не удалось создать директорию $DEPLOY_PATH"
          exit 1
        fi
        # Проверка доступа к Docker
        if ! docker ps > /dev/null; then
          echo "ОШИБКА: Нет доступа к Docker. Проверьте права пользователя $SSH_USER в группе docker"
          exit 1
        fi
        # Копирование .env файла, если он существует
        if [ -f "/etc/nutricoreiq/.env" ]; then
          if ! cp /etc/nutricoreiq/.env "$DEPLOY_PATH/.env"; then
            echo "ОШИБКА: Не удалось скопировать .env файл"
            exit 1
          fi
        fi
        # Переход в директорию проекта
        cd "$DEPLOY_PATH" || { echo "ОШИБКА: Не удалось перейти в директорию $DEPLOY_PATH"; exit 1; }
        # Логин в Docker Registry
        if ! echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$DOCKER_REGISTRY"; then
          echo "ОШИБКА: Не удалось войти в Docker Registry"
          exit 1
        fi
        # Остановка старых контейнеров
        docker-compose -f docker-compose.prod.yml down || echo "Предупреждение: не удалось остановить старые контейнеры"
        # Загрузка нового Docker-образа
        if ! docker pull "$DOCKER_IMAGE"; then
          echo "ОШИБКА: Не удалось загрузить образ $DOCKER_IMAGE"
          exit 1
        fi
        # Запуск сервисов
        if ! docker-compose -f docker-compose.prod.yml up -d; then
          echo "ОШИБКА: Не удалось запустить сервисы"
          exit 1
        fi
        # Очистка неиспользуемых образов
        docker image prune -f
        # Проверка статуса контейнеров
        exited_services=\$(docker-compose -f docker-compose.prod.yml ps | grep Exited | awk '{print \$1}' || true)
        if [ -n "\$exited_services" ]; then
          echo "ОШИБКА: Следующие сервисы завершили работу (Exited): \$exited_services"
          for service in \$exited_services; do
            echo "Логи сервиса \$service:"
            docker-compose -f docker-compose.prod.yml logs "\$service" || true
          done
          exit 1
        fi
        echo "Деплой успешно завершен!"
      EOF

  after_script:
    # Проверка статуса деплоя
    - |
      if [ "$CI_JOB_STATUS" != "success" ]; then
        echo "ОШИБКА: Деплой не удался! Проверьте логи для деталей."
      else
        echo "Деплой успешно завершен!"
      fi
  only:
    - main
  when: manual
  allow_failure: false

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never