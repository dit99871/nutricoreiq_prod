image: python:3.13

services:
  - postgres:17

variables:
  POSTGRES_DB: test_db
  POSTGRES_USER: runner
  POSTGRES_PASSWORD: ""
  POSTGRES_HOST_AUTH_METHOD: trust
  DATABASE_URL: "postgresql+asyncpg://runner@postgres:5432/test_db"

stages:
  - test
  - lint

before_script:
  - apt-get update -qq && apt-get install -y -qq postgresql-client
  - pip install poetry
  - poetry config virtualenvs.create false
  - poetry install --no-interaction --no-root
  - pip install pytest-cov pytest-asyncio asyncpg
  - |
    echo "Waiting for PostgreSQL to be ready..."
    for i in {1..30}; do
      if pg_isready -h postgres -U postgres; then
        echo "PostgreSQL is ready"
        break
      fi
      echo "Waiting for PostgreSQL..."
      sleep 1
    done
    psql -h postgres -U postgres -c "CREATE USER runner WITH SUPERUSER;" || true
    psql -h postgres -U postgres -c "CREATE DATABASE test_db;" || true

test:
  stage: test
  script:
    - pytest --asyncio-mode=auto --cov=src --cov-report=xml
  coverage: '/^TOTAL.+\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

test:lint:
  stage: lint
  script:
    - black --check src/
    - flake8 src/
    - isort --check-only src/