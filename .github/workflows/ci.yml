name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:6.2.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        python-version: "3.13"

    - name: Install dependencies
      run: uv sync --frozen --group dev

    - name: Wait for services
      run: |
        echo "Waiting for PostgreSQL..."
        until pg_isready -h localhost -p 5432; do
          echo "PostgreSQL is unavailable - sleeping"
          sleep 2
        done

        echo "Waiting for Redis..."
        until uv run python -c "import redis; r=redis.Redis(host='localhost', port=6379); r.ping()"; do
          echo "Redis is unavailable - sleeping"
          sleep 2
        done

        echo "All services are ready!"

    - name: Run tests
      env:
        APP_CONFIG__ENV__ENV: "test"

        POSTGRES_DB: test_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_SSL_MODE: disable

        APP_CONFIG__AUTH__ALGORITHM: HS256
        APP_CONFIG__AUTH__ACCESS_TOKEN_EXPIRES: "7"
        APP_CONFIG__AUTH__REFRESH_TOKEN_EXPIRES: "7"

        REDIS_PORT: 6379
        REDIS_ADDR: localhost
        APP_CONFIG__REDIS__URL: "redis://localhost:6379/0"
        APP_CONFIG__REDIS__SALT: test-salt
        APP_CONFIG__REDIS__PASSWORD: test-password
        APP_CONFIG__REDIS__SESSION_TTL: "3600"

        APP_CONFIG__CACHE__USER_TTL: "3600"

        HTTP_PORT: 80
        HTTPS_PORT: 443
        APP_CONFIG__RUN__HOST: "0.0.0.0"
        APP_CONFIG__RUN__PORT: "8080"

        APP_CONFIG__CORS__ALLOW_ORIGINS: '["*"]'
        APP_CONFIG__CORS__ALLOW_METHODS: '["GET", "HEAD", "POST", "DELETE"]'
        APP_CONFIG__CORS__ALLOW_HEADERS: '["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]'
        APP_CONFIG__CORS__ALLOW_CREDENTIALS: "true"

        APP_CONFIG__RATE_LIMIT__REGISTER: "1000/minute"
        APP_CONFIG__RATE_LIMIT__LOGIN: "1000/minute"
        APP_CONFIG__RATE_LIMIT__PASSWORD_CHANGE: "1000/minute"

        APP_CONFIG__LOGGING__LOG_LEVEL: "INFO"

        APP_CONFIG__DB__URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test_db"
        APP_CONFIG__DB__ECHO: "false"

        APP_CONFIG__LOKI__URL: "http://localhost:3100"
        APP_CONFIG__LOKI__ENABLED: "false"

        APP_CONFIG__MAIL__HOST: "smtp.example.com"
        APP_CONFIG__MAIL__PORT: "587"
        APP_CONFIG__MAIL__BUTTON_LINK: "https://example.com/verify"
        APP_CONFIG__MAIL__UNSUBSCRIBE_LINK: "https://example.com/unsubscribe"
        APP_CONFIG__MAIL__USERNAME: "test@example.com"
        APP_CONFIG__MAIL__PASSWORD: "test-password"
        APP_CONFIG__MAIL__USE_TLS: "true"

        APP_CONFIG__SENTRY__DSN: "https://test@example.com/123"

        APP_CONFIG__TASKIQ__URL: "amqp://guest:guest@localhost:5672//"

      run: |
        echo "Running tests (excluding e2e)..."
        uv run pytest -m "not e2e" --asyncio-mode=auto --disable-warnings -v \
        --cov=src --cov-report=xml --cov-report=term-missing
        echo "All tests completed successfully!"
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Run e2e tests (optional)
      if: ${{ vars.RUN_E2E == 'true' }}
      env:
        APP_CONFIG__ENV__ENV: "test"
      run: |
        echo "Starting app for e2e tests..."
        uv run uvicorn src.app.main:app --host 0.0.0.0 --port 8080 &
        APP_PID=$!

        echo "Waiting for app readiness..."
        for i in {1..30}; do
          if curl -s http://localhost:8080/ > /dev/null 2>&1; then
            echo "App is ready on http://localhost:8080"
            break
          else
            echo "Waiting for app... ($i/30)"
            sleep 2
          fi
        done

        echo "Running e2e tests..."
        uv run pytest -m e2e --asyncio-mode=auto --disable-warnings -v

        echo "Stopping app..."
        kill $APP_PID || true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        python-version: "3.13"
    - name: Install dependencies
      run: uv sync --frozen --group dev
    - name: Run black
      run: uv run black --check src/ --exclude "src/app/alembic/versions/"