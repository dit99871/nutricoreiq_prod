name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.0
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: |
        poetry install --no-interaction --no-root
        poetry run pip install pytest-cov pytest-asyncio asyncpg

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        APP_CONFIG__AUTH__SECRET_KEY: test-secret-key
        APP_CONFIG__AUTH__ALGORITHM: HS256
        APP_CONFIG__AUTH__ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        APP_CONFIG__CACHE__ENABLED: "false"
        APP_CONFIG__CORS__ALLOW_ORIGINS: '["*"]'
        APP_CONFIG__CORS__ALLOW_CREDENTIALS: "true"
        APP_CONFIG__CORS__ALLOW_METHODS: '["*"]'
        APP_CONFIG__CORS__ALLOW_HEADERS: '["*"]'
        APP_CONFIG__DB__URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        APP_CONFIG__DB__TEST_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        APP_CONFIG__DB__ECHO: "false"
        APP_CONFIG__DB__IS_TEST: "true"
        APP_CONFIG__ENV__ENVIRONMENT: test
        APP_CONFIG__LOKI__ENABLED: "false"
        APP_CONFIG__MAIL__ENABLED: "false"
        APP_CONFIG__REDIS__URL: redis://localhost:6379/0
        APP_CONFIG__RUN__HOST: 0.0.0.0
        APP_CONFIG__RUN__PORT: "8000"
        APP_CONFIG__SENTRY__ENABLED: "false"
        APP_CONFIG__TASKS__BROKER_URL: redis://localhost:6379/1
      run: |
        poetry run pytest --asyncio-mode=auto

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.8.2
        virtualenvs-create: true
        virtualenvs-in-project: true
    - name: Install dependencies
      run: |
        poetry install --no-interaction --no-root
    - name: Run black
      run: poetry run black --check src/
