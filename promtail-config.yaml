server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5s
      max_retries: 10

scrape_configs:
  - job_name: fastapi
    static_configs:
      - targets:
          - localhost
        labels:
          job: fastapi
          source: app
          __path__: /nutricoreiq/src/app/logs/*.log
    relabel_configs:
      - target_label: container_name
        replacement: web_app
    pipeline_stages:
      - json:
          expressions:
            time: time
            message: message
            level: level
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          level:
      - output:
          source: message

  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          source: system
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - json:
          expressions:
            time: time_local
            message: request
            level: status
      - timestamp:
          source: time
          format: RFC3339
      - labels:

  - job_name: loki
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_grafana_monitoring']
        regex: 'true'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/loki.*'
        action: keep
      - target_label: 'app'
        replacement: 'loki'

  - job_name: promtail
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/promtail.*'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container_name'
      - target_label: 'app'
        replacement: 'promtail'
    pipeline_stages:
      - json:
          expressions:
            time: timestamp
            message: msg
            level: level
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          level:
      - output:
          source: message
