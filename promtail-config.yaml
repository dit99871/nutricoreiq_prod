server:
  http_listen_port: 9080
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  # FastAPI logs
  - job_name: fastapi
    static_configs:
      - targets:
          - localhost
        labels:
          job: fastapi
          source: app
          __path__: /nutricoreiq/src/app/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            message: message
            level: level
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          source: app
  # Nginx logs
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          source: system
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>[^ ]+) - (?P<remote_user>[^ ]+) \[(?P<time_local>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)" "(?P<http_x_forwarded_for>[^"]*)"'
      - json:
          expressions:
            time: time_local
            message: request
            level: status
      - timestamp:
          source: time
          format: "02/Jan/2006:15:04:05 -0700"
      - labels:
          source: system